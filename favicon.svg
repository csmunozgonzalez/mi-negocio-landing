<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 100">
  <style>
    text {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-weight: 900;
      font-size: 85px;
      letter-spacing: -3px;
      fill: #111827; /* Casi negro para modo claro */
    }
    .dot {
      fill: #f97316;  /* Naranja característico */
    }
    
    /* El truco de la magia dinámica: Tema Oscuro */
    @media (prefers-color-scheme: dark) {
      text {
        fill: #F9FAFB; /* Casi blanco para modo oscuro */
      }
      .dot {
        fill: #f97316; /* El naranja se mantiene inmutable */
      }
    }
  </style>
  <text x="5" y="75">mn<tspan class="dot">.</tspan></text>
</svg>
